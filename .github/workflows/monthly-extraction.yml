name: Monthly Data Extraction
run-name: >-
  Monthly Data Extraction —
  ${{
    (inputs.source == '' || inputs.source == 'all') && 'all sources'
    || inputs.source
  }}${{
    inputs.start_override != ''
    && format(' · {0} → {1}', inputs.start_override, inputs.end_override != '' && inputs.end_override || 'today')
    || ''
  }}

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month, 6am UTC
  workflow_dispatch:      # Manual trigger from GitHub UI
    inputs:
      source:
        description: 'Source to extract'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'EIA (USA)'
          - 'ENTSOE (Europe)'
          - 'NPP (India)'
          - 'ONS (Brazil)'
          - 'OE (Australia)'
          - 'OCCTO (Japan)'
          - 'Chile (Coordinador)'
      start_override:
        description: 'Re-run window start (YYYY-MM-DD). Leave blank for default (latest in DB).'
        required: false
        default: ''
      end_override:
        description: 'Re-run window end (YYYY-MM-DD). Leave blank for default (today).'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

env:
  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
  POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_SSLMODE: require

jobs:
  # ─────────────────────────────────────────────
  # EIA (USA) — Monthly generator-level data
  # No API key needed. Uses --start-year/--end-year.
  # ─────────────────────────────────────────────
  extract-eia:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'EIA (USA)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Per-source serialization: any second run targeting EIA (cron, "all",
    # or explicit "EIA (USA)") queues behind the in-flight one.
    concurrency:
      group: extract-eia
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra eia

      - name: Resolve extraction window
        id: latest
        uses: ./.github/actions/resolve-window
        with:
          source: eia
          start_override: ${{ inputs.start_override }}
          end_override: ${{ inputs.end_override }}

      - name: Extract EIA data
        run: |
          cd extractors
          uv run energy-extract eia \
            --start-year "${{ steps.latest.outputs.start_year }}" \
            --end-year "${{ steps.latest.outputs.end_year }}" \
            --output ../extracted_data \
            --log-level INFO

      - name: Load EIA data into Neon
        run: |
          for f in extracted_data/eia_*_etl.jsonl; do
            echo "Loading $f..."
            uv run python src/database_management.py load-data eia "$f"
          done

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eia-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # ONS (Brazil) — Hourly plant-level from S3 Parquet
  # No API key needed. Uses --start-year/--end-year.
  # ─────────────────────────────────────────────
  extract-ons:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'ONS (Brazil)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: extract-ons
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra ons

      - name: Resolve extraction window
        id: latest
        uses: ./.github/actions/resolve-window
        with:
          source: ons
          start_override: ${{ inputs.start_override }}
          end_override: ${{ inputs.end_override }}

      - name: Extract ONS data
        run: |
          cd extractors
          uv run energy-extract ons \
            --start-year "${{ steps.latest.outputs.start_year }}" \
            --end-year "${{ steps.latest.outputs.end_year }}" \
            --output ../extracted_data \
            --log-level INFO

      - name: Load ONS data into Neon
        run: |
          for f in extracted_data/ons_*_etl.jsonl; do
            echo "Loading $f..."
            uv run python src/database_management.py load-data ons "$f"
          done

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ons-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # ENTSOE (Europe) — Hourly plant-level via API
  # Requires ENTSOE_API_KEY. Date via env vars.
  # ─────────────────────────────────────────────
  extract-entsoe:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'ENTSOE (Europe)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: extract-entsoe
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra entsoe

      - name: Extract ENTSOE month-by-month
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          START_OVERRIDE: ${{ inputs.start_override }}
          END_OVERRIDE: ${{ inputs.end_override }}
        run: uv run python src/incremental_extract.py entsoe

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: entsoe-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # NPP (India) — Daily plant-level via HTTP
  # No API key. Uses --start-date/--end-date.
  # ─────────────────────────────────────────────
  extract-npp:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'NPP (India)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: extract-npp
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra npp

      - name: Resolve extraction window
        id: latest
        uses: ./.github/actions/resolve-window
        with:
          source: npp
          start_override: ${{ inputs.start_override }}
          end_override: ${{ inputs.end_override }}

      - name: Extract NPP data
        run: |
          cd extractors
          uv run energy-extract npp \
            --start-date "${{ steps.latest.outputs.start_date }}" \
            --end-date "${{ steps.latest.outputs.end_date }}" \
            --output ../extracted_data \
            --log-level INFO

      - name: Load NPP data into Neon
        run: |
          for f in extracted_data/npp_*_etl.jsonl; do
            echo "Loading $f..."
            uv run python src/database_management.py load-data npp "$f"
          done

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npp-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # OpenElectricity (Australia) — Daily facility data via API
  # Optional OE_API_KEY. Uses --start-date.
  # ─────────────────────────────────────────────
  extract-oe:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'OE (Australia)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: extract-oe
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra openelectricity

      - name: Resolve extraction window
        id: latest
        uses: ./.github/actions/resolve-window
        with:
          source: oe
          start_override: ${{ inputs.start_override }}
          end_override: ${{ inputs.end_override }}

      - name: Extract OpenElectricity data
        env:
          OPENELECTRICITY_API_KEY: ${{ secrets.OE_API_KEY }}
        run: |
          cd extractors
          uv run energy-extract openelectricity \
            --start-date "${{ steps.latest.outputs.start_date }}" \
            --end-date "${{ steps.latest.outputs.end_date }}" \
            --output ../extracted_data \
            --facilities \
            --log-level INFO

      - name: Load OE facility data into Neon
        run: |
          for f in extracted_data/*_etl.jsonl; do
            echo "Loading $f..."
            uv run python src/database_management.py load-data oe_facility "$f"
          done

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oe-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # OCCTO (Japan) — Half-hourly via Selenium
  # No API key. Needs headless Chrome.
  # ─────────────────────────────────────────────
  extract-occto:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'OCCTO (Japan)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: extract-occto
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra occto

      - name: Extract OCCTO month-by-month
        env:
          START_OVERRIDE: ${{ inputs.start_override }}
          END_OVERRIDE: ${{ inputs.end_override }}
        run: uv run python src/incremental_extract.py occto

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: occto-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # Chile (Coordinador) — Hourly plant-level coal via SIP API
  # Requires CL_API_KEY (Coordinador SIP token). Date via resolve-window.
  # Default quota is 60 req/hr — monthly increment for 12 coal plants is
  # roughly 12–36 requests, well within the timeout below.
  # ─────────────────────────────────────────────
  extract-chile:
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'Chile (Coordinador)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: extract-chile
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout extractors repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/energy-extractors
          path: extractors
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ETL dependencies
        run: uv sync

      - name: Install extractor dependencies
        run: |
          cd extractors
          uv sync --extra chile

      - name: Resolve extraction window
        id: latest
        uses: ./.github/actions/resolve-window
        with:
          source: chile
          start_override: ${{ inputs.start_override }}
          end_override: ${{ inputs.end_override }}

      - name: Extract Chile data
        env:
          CL_API_KEY: ${{ secrets.CL_API_KEY }}
        run: |
          cd extractors
          uv run energy-extract chile \
            --start-date "${{ steps.latest.outputs.start_date }}" \
            --end-date "${{ steps.latest.outputs.end_date }}" \
            --output ../extracted_data \
            --log-level INFO

      - name: Load Chile data into Neon
        run: |
          for f in extracted_data/chile_*_etl.jsonl; do
            echo "Loading $f..."
            uv run python src/database_management.py load-data chile "$f"
          done

      - name: Upload artifacts (on failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chile-extraction-${{ github.run_id }}
          path: |
            extracted_data/*.jsonl
            extracted_data/logs/
            extracted_data/extraction_metadata_*.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # Rebuild the NPP plant_crosswalk after extraction so newly-appearing plants
  # get coal_type / coordinates. The dashboard classifies NPP coal via
  # plant_crosswalk.coal_type (joined by plant name), so without this a new coal
  # plant shows as non-coal until a manual rebuild. build_crosswalk needs the
  # GEM + GPPD reference CSVs, which are gitignored (~72 MB, too large for the
  # repo); provide them via the CROSSWALK_REF_DATA_URL secret — a gzipped tar
  # unpacking into data/crosswalks/ ("GEM database_*.csv",
  # global_power_plant_database.csv, eia_plant_lookup.csv). If the secret is
  # unset the job skips cleanly and check-crosswalk-drift still flags new plants
  # for a manual rebuild — so this never breaks the monthly run.
  #
  # Prereqs: CROSSWALK_REF_DATA_URL secret; EXTRACTORS_REPO_TOKEN must also grant
  # read access to the plant-data repo.
  # ─────────────────────────────────────────────
  rebuild-npp-crosswalk:
    needs: extract-npp
    if: ${{ always() && needs.extract-npp.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: rebuild-npp-crosswalk
      cancel-in-progress: false
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Checkout plant-data repo
        uses: actions/checkout@v4
        with:
          repository: nicholas-abad/plant-data
          path: plant-data
          token: ${{ secrets.EXTRACTORS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch crosswalk reference data
        id: refdata
        env:
          CROSSWALK_REF_DATA_URL: ${{ secrets.CROSSWALK_REF_DATA_URL }}
        run: |
          if [ -z "$CROSSWALK_REF_DATA_URL" ]; then
            echo "CROSSWALK_REF_DATA_URL not set — skipping crosswalk rebuild."
            echo "(check-crosswalk-drift will still flag any new plants for a manual rebuild.)"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsSL "$CROSSWALK_REF_DATA_URL" -o /tmp/refdata.tar.gz
          tar -xzf /tmp/refdata.tar.gz -C plant-data/data/crosswalks/
          # Fail loud if the bundle didn't deliver the CSVs build_crosswalk needs.
          # Otherwise GEM_CSV would be absent, the NPP rebuild would be empty, and
          # the destructive load below would wipe NPP coal classification in prod.
          missing=0
          ls plant-data/data/crosswalks/GEM\ database_*.csv >/dev/null 2>&1 \
            || { echo "::error::GEM database CSV missing after extracting reference bundle"; missing=1; }
          test -f "plant-data/data/crosswalks/global_power_plant_database.csv" \
            || { echo "::error::global_power_plant_database.csv missing after extracting reference bundle"; missing=1; }
          [ "$missing" = "1" ] && exit 1
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Rebuild NPP crosswalk rows
        if: ${{ steps.refdata.outputs.ok == 'true' }}
        run: |
          cd plant-data
          uv sync
          uv run python -m src.build_crosswalk --sources NPP --no-llm --yes

      - name: Verify rebuilt crosswalk before loading
        if: ${{ steps.refdata.outputs.ok == 'true' }}
        # Refuse to push a degraded crosswalk: the load DROPs and replaces the
        # live table, so a near-empty NPP coal set (e.g. GEM data went missing)
        # must abort here rather than break the dashboard. ~249 NPP coal plants
        # is the validated baseline; 200 is a safe floor.
        run: |
          cd plant-data
          uv run python - <<'PY'
          import sys
          import pandas as pd
          df = pd.read_parquet("data/crosswalks/unified_plant_crosswalk.parquet")
          npp_coal = int(((df["source_system"] == "NPP") & (df["coal_type"].notna())).sum())
          print(f"rebuilt crosswalk: {len(df):,} rows, NPP coal_type = {npp_coal}")
          if npp_coal < 200:
              sys.exit(f"ABORT: only {npp_coal} NPP coal plants (< 200) — refusing to load a degraded crosswalk")
          PY

      - name: Load updated crosswalk into Neon
        if: ${{ steps.refdata.outputs.ok == 'true' }}
        run: |
          cd plant-data
          uv run python - <<'PY'
          import sys
          sys.path.insert(0, "scripts")
          from bootstrap_neon_db import get_engine, load_unified_crosswalk
          load_unified_crosswalk(get_engine())
          PY

  # ─────────────────────────────────────────────
  # Refresh materialized views after all loads
  # ─────────────────────────────────────────────
  refresh-views:
    needs: [extract-eia, extract-ons, extract-entsoe, extract-npp, extract-oe, extract-occto, extract-chile]
    if: ${{ always() && (needs.extract-eia.result == 'success' || needs.extract-ons.result == 'success' || needs.extract-entsoe.result == 'success' || needs.extract-npp.result == 'success' || needs.extract-oe.result == 'success' || needs.extract-occto.result == 'success' || needs.extract-chile.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Refresh all materialized views
        run: uv run python src/refresh_views.py

  # ─────────────────────────────────────────────
  # Drift check — detect plants in raw tables not in plant_crosswalk
  # Informational only; opens an issue if new plants need mapping
  # ─────────────────────────────────────────────
  check-crosswalk-drift:
    # Depend on the rebuild too, so drift is checked against the rebuilt
    # crosswalk (not the pre-rebuild state, and not mid-DROP/recreate).
    needs: [refresh-views, rebuild-npp-crosswalk]
    if: ${{ always() && needs.refresh-views.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout ETL repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Check for crosswalk drift
        run: uv run python src/check_crosswalk_drift.py

      - name: Open issue if drift detected
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('drift_report.json', 'utf8'));
            if (report.total_missing === 0) {
              core.info('No drift — skipping issue creation');
              return;
            }

            const lines = [
              `## Plant Crosswalk Drift Detected`,
              ``,
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              `**Total unmapped plants:** ${report.total_missing}`,
              ``,
              `These plants appear in raw generation tables but have no entry in \`plant_crosswalk\`. They will display in the dashboard with NULL coordinates until the crosswalk is rebuilt.`,
              ``,
              `### By Source`,
              ``,
              `| Source | Missing | Sample (first 20) |`,
              `|---|---|---|`,
            ];
            for (const [src, info] of Object.entries(report.by_source)) {
              const sample = info.sample.length > 0
                ? info.sample.map(s => `\`${s}\``).join(', ')
                : '—';
              lines.push(`| ${src} | ${info.count} | ${sample} |`);
            }
            lines.push(``);
            lines.push(`### To Fix`);
            lines.push(``);
            lines.push(`Rebuild the crosswalk in the \`plant-data\` repo:`);
            lines.push(`\`\`\`bash`);
            lines.push(`cd data/plant-data`);
            lines.push(`uv run python -m src.build_crosswalk --no-llm  # try fuzzy matching first`);
            lines.push(`uv run python -m src.build_crosswalk           # fallback to LLM if needed`);
            lines.push(`uv run python scripts/bootstrap_neon_db.py --data-only`);
            lines.push(`\`\`\``);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Plant crosswalk drift: ${report.total_missing} unmapped plants`,
              body: lines.join('\n'),
              labels: ['crosswalk-drift', 'automated'],
            });

  # ─────────────────────────────────────────────
  # Notify on failure — create GitHub Issue
  # ─────────────────────────────────────────────
  notify-failure:
    needs: [extract-eia, extract-ons, extract-entsoe, extract-npp, extract-oe, extract-occto, extract-chile, refresh-views, check-crosswalk-drift]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'extract-eia': '${{ needs.extract-eia.result }}',
              'extract-ons': '${{ needs.extract-ons.result }}',
              'extract-entsoe': '${{ needs.extract-entsoe.result }}',
              'extract-npp': '${{ needs.extract-npp.result }}',
              'extract-oe': '${{ needs.extract-oe.result }}',
              'extract-occto': '${{ needs.extract-occto.result }}',
              'refresh-views': '${{ needs.refresh-views.result }}',
              'check-crosswalk-drift': '${{ needs.check-crosswalk-drift.result }}',
            };
            const failed = Object.entries(jobs)
              .filter(([_, v]) => v === 'failure')
              .map(([k, _]) => k);

            const body = [
              `## Monthly Extraction Failed`,
              ``,
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Trigger:** ${context.eventName}`,
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              ``,
              `### Failed Jobs`,
              ...failed.map(j => `- ❌ \`${j}\``),
              ``,
              `### All Job Results`,
              ...Object.entries(jobs).map(([k, v]) => `- ${v === 'success' ? '✅' : v === 'failure' ? '❌' : '⏭️'} \`${k}\`: ${v}`),
              ``,
              `Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for error details.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Monthly extraction failed: ${failed.join(', ')}`,
              body: body,
              labels: ['extraction-failure', 'automated'],
            });
